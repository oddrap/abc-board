<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABC Pulse</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       ABC Pulse — CI-aligned Rams Edition
       Palette anchored to ABC Partners CI blue.
       ═══════════════════════════════════════ */

    :root {
      --canvas: #F5F7FA;
      --surface: #FFFFFF;
      --border: #E0E5EB;
      --border-light: #EBF0F4;
      --text-1: #1A2233;
      --text-2: #5A6577;
      --text-3: #6E7A8A;
      --accent: #4A9FD9;
      --accent-dark: #3A85BA;
      --active: #4A9FD9;
      --stale: #C9963A;
      --dead: #94A0B0;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Manrope', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--canvas);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ─── */

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--canvas);
      padding: 20px 20px 0;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .wordmark img {
      height: 28px;
      width: auto;
    }

    .wordmark .count {
      font-weight: 300;
      color: var(--text-3);
      font-size: 13px;
      font-family: var(--font-mono);
      letter-spacing: 0;
    }

    .add-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s;
    }

    .add-btn:active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ─── Search ─── */

    .search-bar {
      padding: 0 0 12px;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-1);
      background: var(--surface);
      border: 1px solid var(--border);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input::placeholder {
      color: var(--text-3);
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    /* ─── Tabs ─── */

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-3);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text-2); }

    .tab.active {
      color: var(--text-1);
      border-bottom-color: var(--text-1);
    }

    .tab .n {
      font-weight: 400;
      margin-left: 2px;
      color: var(--text-3);
    }

    .tab-total {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 10px 0;
      flex-shrink: 0;
    }

    /* ─── Portfolio List ─── */

    .list {
      padding: 0 20px 100px;
    }

    .row {
      display: grid;
      grid-template-columns: 3px 36px 1fr auto;
      gap: 0 14px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .row:active {
      background: rgba(0,0,0,0.02);
      margin: 0 -20px;
      padding: 14px 20px;
    }

    .row-indicator {
      width: 3px;
      height: 28px;
      border-radius: 1px;
    }

    .row-indicator.active { background: var(--active); }
    .row-indicator.stale { background: var(--stale); }
    .row-indicator.dead { background: var(--dead); }
    
    .row-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      background: var(--surface);
      border: 1px solid var(--border-light);
      padding: 3px;
    }

    .row-logo.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      background: var(--border-light);
      border: none;
    }

    .row-info {
      min-width: 0;
    }

    .row-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .row-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .row-right {
      text-align: right;
      flex-shrink: 0;
    }

    .row-count {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
    }

    .row-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .row-stale-mark {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--stale);
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ─── Detail View ─── */

    .detail-view {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--canvas);
      z-index: 200;
      overflow-y: auto;
    }

    .detail-view.open { display: block; }

    .detail-header {
      position: sticky;
      top: 0;
      background: var(--canvas);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .back-btn {
      font-size: 16px;
      cursor: pointer;
      padding: 4px 0;
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font-body);
      font-weight: 300;
    }

    .detail-title {
      flex: 1;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .status-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      border: 1px solid;
      cursor: pointer;
    }

    .status-tag.active { color: var(--active); border-color: var(--active); }
    .status-tag.stale { color: var(--stale); border-color: var(--stale); }
    .status-tag.dead { color: var(--dead); border-color: var(--dead); }
    
    .detail-body {
      padding: 24px 20px 100px;
    }

    .detail-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-2);
      letter-spacing: 0.02em;
      padding-bottom: 16px;
      margin-bottom: 4px;
    }

    .detail-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 20px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 24px;
    }

    .detail-status-bar .label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 5px 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: none;
      transition: border-color 0.15s;
    }

    .status-chip.active { color: var(--active); border-color: var(--active); }
    .status-chip.stale { color: var(--stale); border-color: var(--stale); }
    .status-chip.dead { color: var(--dead); border-color: var(--dead); }
    .status-chip.selected {
      background: var(--border-light);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    /* ─── Update Entries ─── */

    .update-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .update-entry {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
    }

    .update-entry:last-child { border-bottom: none; }

    .update-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .update-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }

    .update-summary {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-2);
      margin-top: 8px;
      display: none;
    }

    .update-summary.expanded { display: block; }

    .update-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .attachment-link {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      padding: 3px 8px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .attachment-link:hover { border-color: var(--accent); }

    .add-update-btn {
      width: 100%;
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      cursor: pointer;
      margin-top: 24px;
      transition: border-color 0.2s, color 0.2s;
    }

    .add-update-btn:active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Empty State ─── */

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-3);
    }

    .empty-state p {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    /* ─── Modal ─── */

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(28, 28, 28, 0.3);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px 20px 32px;
      border-top: 1px solid var(--border);
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      display: block;
      margin-bottom: 8px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 0;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-1);
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-bottom-color: var(--text-1);
    }

    .field textarea {
      min-height: 64px;
      resize: vertical;
      border: 1px solid var(--border);
      padding: 10px;
    }

    .field textarea:focus {
      border-color: var(--text-1);
    }

    .field select {
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .file-upload-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-btn-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-2);
      transition: border-color 0.15s;
    }

    .file-btn-label:active { border-color: var(--text-1); }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .file-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
    }

    .file-tag .remove {
      cursor: pointer;
      color: var(--text-3);
      font-size: 13px;
      line-height: 1;
    }

    .file-tag .remove:hover { color: var(--accent); }

    .link-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .link-row input { flex: 1; }

    .link-row .remove-link {
      padding: 10px 8px;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 14px;
    }

    .add-link-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 8px 0;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.02em;
    }

    .add-link-btn:hover { color: var(--text-2); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-3);
      cursor: pointer;
    }

    .btn-submit {
      flex: 1;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--text-1);
      border: 1px solid var(--text-1);
      color: var(--surface);
      cursor: pointer;
    }

    .btn-submit:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-submit:active:not(:disabled) {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    /* ─── Status Popup ─── */

    .status-popup {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      z-index: 400;
      min-width: 240px;
    }

    .status-popup.open { display: block; }

    .status-popup h3 {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .status-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .status-option:hover { background: var(--canvas); }

    .status-option.current {
      background: var(--canvas);
    }

    .status-indicator {
      width: 3px;
      height: 16px;
      border-radius: 1px;
    }

    .status-indicator.active { background: var(--active); }
    .status-indicator.stale { background: var(--stale); }
    .status-indicator.dead { background: var(--dead); }
    
    .status-option .label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-1);
    }

    /* ─── Loading ─── */

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-top-color: var(--text-2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
    }
  </style>
</head>
<body>

<!-- Main View -->
<div id="main-view">
  <div class="header">
    <div class="header-top">
      <div class="wordmark">
        <img src="/assets/logo.png" alt="ABC Partners">
        <span class="count">v0.3.0</span>
      </div>
      <button class="add-btn" id="fab-add">+ New</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search portfolios...">
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-status="active">Active <span class="n">0</span></button>
      <button class="tab" data-status="stale">Stale <span class="n">0</span></button>
      <button class="tab" data-status="dead">Closed <span class="n">0</span></button>
      <span class="tab-total">Total <span class="n" id="total-count">0</span></span>
    </div>
  </div>
  <div class="list" id="card-list">
    <div class="loading-screen"><div class="spinner"></div></div>
  </div>
</div>

<!-- Detail View -->
<div class="detail-view" id="detail-view">
  <div class="detail-header">
    <button class="back-btn" id="back-btn">&larr;</button>
    <span class="detail-title" id="detail-name"></span>
    <span class="status-tag" id="detail-status" data-id=""></span>
  </div>
  <div class="detail-body">
    <div class="detail-meta" id="detail-assignee"></div>
    <div class="detail-status-bar" id="detail-status-bar">
      <span class="label">Status</span>
      <button class="status-chip active" data-status="active">Active</button>
      <button class="status-chip stale" data-status="stale">Stale</button>
      <button class="status-chip dead" data-status="dead">Closed</button>
    </div>
    <div class="section-label">Updates</div>
    <div class="update-list" id="update-list"></div>
    <button class="add-update-btn" id="add-update-btn">+ Add update</button>
  </div>
</div>

<!-- Add Portfolio Modal -->
<div class="modal-overlay" id="modal-portfolio">
  <div class="modal">
    <h2 class="modal-title">New Portfolio</h2>
    <div class="field">
      <label class="field-label">Company / Fund</label>
      <input type="text" id="pf-name" placeholder="Name">
    </div>
    <div class="field">
      <label class="field-label">Status</label>
      <select id="pf-status">
        <option value="active">Active</option>
        <option value="stale">Stale</option>
        <option value="dead">Closed</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-portfolio')">Cancel</button>
      <button class="btn-submit" id="btn-create-pf">Create</button>
    </div>
  </div>
</div>

<!-- Add Update Modal -->
<div class="modal-overlay" id="modal-update">
  <div class="modal">
    <h2 class="modal-title">Add Update</h2>
    <div class="field">
      <label class="field-label">Date</label>
      <input type="date" id="up-date">
    </div>
    <div class="field">
      <label class="field-label">Title</label>
      <input type="text" id="up-title" placeholder="Update title">
    </div>
    <div class="field">
      <label class="field-label">Summary</label>
      <textarea id="up-summary" placeholder="Optional summary"></textarea>
    </div>
    <div class="field">
      <label class="field-label">Attachments</label>
      <div class="file-upload-area">
        <label class="file-btn-label">Choose files
          <input type="file" id="up-files" multiple style="display:none">
        </label>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>
    <div class="field">
      <label class="field-label">Drive Links</label>
      <div class="link-inputs" id="link-inputs">
        <div class="link-row">
          <input type="url" placeholder="https://drive.google.com/..." class="gdrive-link">
        </div>
      </div>
      <button class="add-link-btn" id="add-link-btn">+ Add another link</button>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-update')">Cancel</button>
      <button class="btn-submit" id="btn-create-update">Submit</button>
    </div>
  </div>
</div>

<!-- Status Change Popup -->
<div class="modal-overlay" id="status-overlay">
  <div class="status-popup" id="status-popup">
    <h3>Change Status</h3>
    <div class="status-option" data-status="active">
      <span class="status-indicator active"></span>
      <span class="label">Active</span>
    </div>
    <div class="status-option" data-status="stale">
      <span class="status-indicator stale"></span>
      <span class="label">Stale</span>
    </div>
    <div class="status-option" data-status="dead">
      <span class="status-indicator dead"></span>
      <span class="label">Closed</span>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#F5F7FA');
    tg.setBackgroundColor('#F5F7FA');
  }

  const API = '';
  const initData = tg?.initData || '';
  function headers(extra = {}) {
    return { 'X-Telegram-Init-Data': initData, ...extra };
  }

  let allPortfolios = [];
  let portfolios = [];
  let currentFilter = 'active';
  let currentPortfolioId = null;
  let statusChangeId = null;
  let selectedFiles = [];

  const STATUS_LABEL = { active: 'Active', stale: 'Stale', dead: 'Closed' };

  function updateTabCounts() {
    const counts = { active: 0, stale: 0, dead: 0 };
    allPortfolios.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
    document.querySelectorAll('.tab').forEach(tab => {
      const status = tab.dataset.status;
      const n = tab.querySelector('.n');
      if (n) n.textContent = counts[status] ?? 0;
    });
    document.getElementById('total-count').textContent = allPortfolios.length;
  }

  async function loadPortfolios() {
    try {
      // Always fetch all for counts
      const allRes = await fetch(`${API}/api/portfolios`, { headers: headers() });
      if (allRes.status === 401 || allRes.status === 403) {
        document.getElementById('card-list').innerHTML = `
          <div class="empty-state" style="padding-top:80px">
            <p style="font-size:14px;color:var(--text-1);margin-bottom:8px">Access Denied</p>
            <p>This app is restricted to authorized team members.</p>
          </div>`;
        return;
      }
      allPortfolios = await allRes.json();
      updateTabCounts();
      applyFilters();
    } catch (e) { console.error('Load error:', e); }
  }

  let searchQuery = '';

  document.getElementById('search-input').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    applyFilters();
  });

  function applyFilters() {
    let filtered = allPortfolios;
    if (currentFilter) filtered = filtered.filter(p => p.status === currentFilter);
    if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
    portfolios = filtered;
    renderCards();
  }

  function renderCards() {
    const list = document.getElementById('card-list');

    if (portfolios.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No portfolios found</p></div>';
      return;
    }

    list.innerHTML = portfolios.map(p => {
      const logoHtml = p.logo_url
        ? `<img class="row-logo" src="${p.logo_url}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'row-logo placeholder\\'>${p.name[0]}</div>'">`
        : `<div class="row-logo placeholder">${p.name[0]}</div>`;

      const lastUpdate = p.last_update_at
        ? new Date(p.last_update_at + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        : '\u2014';

      const staleMark = p.is_stale_warning ? '<span class="row-stale-mark"></span>' : '';

      return `
        <div class="row" data-id="${p.id}" onclick="openDetail(${p.id})" oncontextmenu="openStatusChange(event, ${p.id})">
          <div class="row-indicator ${p.status}"></div>
          ${logoHtml}
          <div class="row-info">
            <div class="row-name">${p.name}${staleMark}</div>
            <div class="row-meta">${p.assignee_name || 'Unassigned'}</div>
          </div>
          <div class="row-right">
            <div class="row-count">${p.update_count || 0}</div>
            <div class="row-date">${lastUpdate}</div>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.status;
    applyFilters();
  });

  async function openDetail(id) {
    currentPortfolioId = id;
    const p = portfolios.find(x => x.id === id);
    if (!p) return;

    document.getElementById('detail-name').textContent = p.name;
    const badge = document.getElementById('detail-status');
    badge.textContent = STATUS_LABEL[p.status];
    badge.className = `status-tag ${p.status}`;
    badge.dataset.id = id;
    badge.onclick = () => openStatusChange(null, id);
    document.getElementById('detail-assignee').textContent = p.assignee_name ? `Managed by ${p.assignee_name}` : 'Unassigned';

    // Status bar
    document.querySelectorAll('.status-chip').forEach(chip => {
      chip.classList.toggle('selected', chip.dataset.status === p.status);
    });

    document.getElementById('detail-view').classList.add('open');
    if (tg) tg.BackButton.show();

    const updateList = document.getElementById('update-list');
    updateList.innerHTML = '<div class="loading-screen"><div class="spinner"></div></div>';

    try {
      const res = await fetch(`${API}/api/portfolios/${id}/updates`, { headers: headers() });
      const updates = await res.json();
      renderUpdates(updates);
    } catch (e) {
      updateList.innerHTML = '<div class="empty-state"><p>Failed to load</p></div>';
    }
  }

  function renderUpdates(updates) {
    const list = document.getElementById('update-list');
    if (updates.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No updates yet</p></div>';
      return;
    }

    list.innerHTML = updates.map(u => {
      const attachHtml = (u.attachments || []).map(a =>
        `<a class="attachment-link" href="${a.gdrive_url}" target="_blank">${a.file_name}</a>`
      ).join('');

      const summaryHtml = u.summary
        ? `<div class="update-summary">${u.summary}</div>` : '';

      return `
        <div class="update-entry" onclick="this.querySelector('.update-summary')?.classList.toggle('expanded')">
          <div class="update-date">${u.update_date} &middot; ${u.author_name}</div>
          <div class="update-title">${u.title}</div>
          ${summaryHtml}
          ${attachHtml ? `<div class="update-attachments">${attachHtml}</div>` : ''}
        </div>`;
    }).join('');
  }

  // Status chips in detail view
  document.querySelectorAll('.status-chip').forEach(chip => {
    chip.addEventListener('click', async () => {
      const newStatus = chip.dataset.status;
      if (!currentPortfolioId) return;
      try {
        await fetch(`${API}/api/portfolios/${currentPortfolioId}`, {
          method: 'PUT',
          headers: headers({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ status: newStatus }),
        });
        document.querySelectorAll('.status-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        const badge = document.getElementById('detail-status');
        badge.textContent = STATUS_LABEL[newStatus];
        badge.className = `status-tag ${newStatus}`;
      } catch (e) { console.error(e); }
    });
  });

  document.getElementById('back-btn').addEventListener('click', closeDetail);
  if (tg) tg.BackButton.onClick(closeDetail);

  function closeDetail() {
    document.getElementById('detail-view').classList.remove('open');
    if (tg) tg.BackButton.hide();
    currentPortfolioId = null;
    loadPortfolios();
  }

  function openStatusChange(e, id) {
    if (e) e.preventDefault();
    statusChangeId = id;
    const p = portfolios.find(x => x.id === id);
    document.querySelectorAll('.status-option').forEach(opt => {
      opt.classList.toggle('current', opt.dataset.status === p?.status);
    });
    document.getElementById('status-overlay').classList.add('open');
    document.getElementById('status-popup').classList.add('open');
  }

  document.getElementById('status-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'status-overlay') {
      document.getElementById('status-overlay').classList.remove('open');
      document.getElementById('status-popup').classList.remove('open');
    }
  });

  document.querySelectorAll('.status-option').forEach(opt => {
    opt.addEventListener('click', async () => {
      const newStatus = opt.dataset.status;
      try {
        await fetch(`${API}/api/portfolios/${statusChangeId}`, {
          method: 'PUT',
          headers: headers({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ status: newStatus }),
        });
        document.getElementById('status-overlay').classList.remove('open');
        document.getElementById('status-popup').classList.remove('open');
        loadPortfolios();
        if (currentPortfolioId === statusChangeId) {
          const badge = document.getElementById('detail-status');
          badge.textContent = STATUS_LABEL[newStatus];
          badge.className = `status-tag ${newStatus}`;
        }
      } catch (e) { alert('Failed to update status'); }
    });
  });

  let pressTimer;
  document.getElementById('card-list').addEventListener('touchstart', (e) => {
    const row = e.target.closest('.row');
    if (!row) return;
    pressTimer = setTimeout(() => openStatusChange(null, parseInt(row.dataset.id)), 500);
  });
  document.getElementById('card-list').addEventListener('touchend', () => clearTimeout(pressTimer));
  document.getElementById('card-list').addEventListener('touchmove', () => clearTimeout(pressTimer));

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });
  });

  document.getElementById('fab-add').addEventListener('click', () => openModal('modal-portfolio'));

  document.getElementById('btn-create-pf').addEventListener('click', async () => {
    const name = document.getElementById('pf-name').value.trim();
    const status = document.getElementById('pf-status').value;
    if (!name) { alert('Enter a name'); return; }
    const btn = document.getElementById('btn-create-pf');
    btn.disabled = true;
    try {
      await fetch(`${API}/api/portfolios`, {
        method: 'POST', headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ name, status }),
      });
      document.getElementById('pf-name').value = '';
      closeModal('modal-portfolio');
      loadPortfolios();
    } catch (e) { alert('Failed'); }
    finally { btn.disabled = false; }
  });

  document.getElementById('add-update-btn').addEventListener('click', () => {
    document.getElementById('up-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('up-title').value = '';
    document.getElementById('up-summary').value = '';
    document.getElementById('up-files').value = '';
    selectedFiles = [];
    renderFileList();
    document.getElementById('link-inputs').innerHTML = '<div class="link-row"><input type="url" placeholder="https://drive.google.com/..." class="gdrive-link"></div>';
    openModal('modal-update');
  });

  document.getElementById('up-files').addEventListener('change', async (e) => {
    const newFiles = Array.from(e.target.files);
    const oversized = newFiles.filter(f => f.size > 25 * 1024 * 1024);
    if (oversized.length > 0) alert(`${oversized.map(f => f.name).join(', ')} exceeds 25MB`);
    const validFiles = newFiles.filter(f => f.size <= 25 * 1024 * 1024);
    selectedFiles = [...selectedFiles, ...validFiles];
    renderFileList();

    // Auto-fill title from first filename (strip extension and clean up)
    const titleEl = document.getElementById('up-title');
    if (validFiles.length > 0 && !titleEl.value.trim()) {
      const name = validFiles[0].name
        .replace(/\.[^.]+$/, '')        // remove extension
        .replace(/[_-]/g, ' ')          // underscores/dashes to spaces
        .replace(/\s+/g, ' ')           // collapse spaces
        .trim();
      titleEl.value = name;
    }

    // Auto-summarize: call Gemini directly from browser (no Workers proxy)
    const summaryEl = document.getElementById('up-summary');
    const fileToSummarize = validFiles[0];
    if (fileToSummarize && !summaryEl.value.trim()) {
      summaryEl.value = 'AI 요약 생성 중...';
      summaryEl.disabled = true;
      try {
        const reader = new FileReader();
        reader.onload = async function() {
          try {
            const base64 = reader.result.split(',')[1];
            const mimeType = fileToSummarize.type || 'application/octet-stream';
            const GEMINI_KEY = 'AIzaSyBrSw5RHH6YoiM4FN7HBe6S6hbm-qFJTnw';

            console.log('[Summary] Sending to Gemini:', mimeType, Math.round(base64.length/1024)+'KB base64');

            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [
                    { inlineData: { mimeType, data: base64 } },
                    { text: '이 문서를 분석하여 다음 형식으로 한국어 요약을 작성해주세요. 2500자 이내로 작성하세요.\n\n1. 매출 현황 요약\n(매출, 수익, 성장률 등 핵심 재무 수치 중심)\n\n2. 문제 상황 요약\n(리스크, 손실, 구조적 문제, 주의사항 중심)\n\n3. 향후 계획 요약\n(엑시트 전략, 사업 확장, 투자 계획 등 미래 방향 중심)\n\n마크다운 없이 일반 텍스트로 작성하세요. 번호와 제목은 유지하세요.' }
                  ]}],
                  generationConfig: { maxOutputTokens: 2500, temperature: 0.3 }
                })
              }
            );

            const data = await res.json();
            console.log('[Summary] Gemini response:', JSON.stringify(data).substring(0, 500));

            if (data?.error) {
              summaryEl.value = '요약 실패: ' + (data.error.message || 'Unknown error');
            } else {
              summaryEl.value = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '요약을 생성하지 못했습니다';
            }
          } catch (err) {
            console.error('[Summary] Error:', err);
            summaryEl.value = '요약 실패: ' + err.message;
          } finally {
            summaryEl.disabled = false;
            summaryEl.focus();
          }
        };
        reader.onerror = () => { summaryEl.value = '파일 읽기 실패'; summaryEl.disabled = false; };
        reader.readAsDataURL(fileToSummarize);
      } catch (err) {
        summaryEl.value = '';
        summaryEl.disabled = false;
        console.error('Summary error:', err);
      }
    }
  });

  function renderFileList() {
    document.getElementById('file-list').innerHTML = selectedFiles.map((f, i) =>
      `<span class="file-tag">${f.name} <span class="remove" onclick="removeFile(${i})">×</span></span>`
    ).join('');
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }

  document.getElementById('add-link-btn').addEventListener('click', () => {
    const container = document.getElementById('link-inputs');
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `<input type="url" placeholder="https://drive.google.com/..." class="gdrive-link"><button class="remove-link" onclick="this.parentElement.remove()">×</button>`;
    container.appendChild(row);
  });

  document.getElementById('btn-create-update').addEventListener('click', async () => {
    const title = document.getElementById('up-title').value.trim();
    const date = document.getElementById('up-date').value;
    const summary = document.getElementById('up-summary').value.trim();
    if (!title) { alert('Enter a title'); return; }

    const btn = document.getElementById('btn-create-update');
    btn.disabled = true;
    try {
      const formData = new FormData();
      formData.append('title', title);
      formData.append('update_date', date);
      if (summary) formData.append('summary', summary);
      selectedFiles.forEach(f => formData.append('files', f));
      document.querySelectorAll('.gdrive-link').forEach(input => {
        if (input.value.trim()) formData.append('gdrive_link', input.value.trim());
      });
      await fetch(`${API}/api/portfolios/${currentPortfolioId}/updates`, {
        method: 'POST', headers: { 'X-Telegram-Init-Data': initData }, body: formData,
      });
      closeModal('modal-update');
      openDetail(currentPortfolioId);
    } catch (e) { alert('Failed'); }
    finally { btn.disabled = false; }
  });

  loadPortfolios();
</script>
</body>
</html>
